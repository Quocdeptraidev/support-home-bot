name: support-home-bot

services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-homestay_support}
      POSTGRES_USER: ${POSTGRES_USER:-homestay}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./apps/api
    environment:
      APP_NAME: ${APP_NAME:-may-homestay-support-bot}
      APP_ENV: ${APP_ENV:-development}
      APP_DEBUG: ${APP_DEBUG:-true}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      HOST: 0.0.0.0
      PORT: 8000
      APP_TIMEZONE: ${APP_TIMEZONE:-Asia/Ho_Chi_Minh}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://homestay:change_me@db:5432/homestay_support}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      FB_PAGE_ACCESS_TOKEN: ${FB_PAGE_ACCESS_TOKEN:-}
      FB_APP_SECRET: ${FB_APP_SECRET:-}
      FB_VERIFY_TOKEN: ${FB_VERIFY_TOKEN:-}
      FB_API_VERSION: ${FB_API_VERSION:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
      OPENAI_CLASSIFICATION_MODEL: ${OPENAI_CLASSIFICATION_MODEL:-}
      OPENAI_RESPONSE_MODEL: ${OPENAI_RESPONSE_MODEL:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: fastapi dev app/main.py --host 0.0.0.0 --port 8000

volumes:
  postgres_data:
  redis_data:
